<div class="container-footer">
  <div class="card">
    <div class="card-header">
      <h3>Configuración del Pie de Página</h3>
      <p class="subtitle">Actualiza los medios de contacto oficiales de la institución</p>
    </div>
    
    <div class="card-body">
      <div *ngIf="mensajeExito" class="alert alert-success">
        {{ mensajeExito }}
      </div>
      
      <div *ngIf="mensajeError" class="alert alert-danger">
        {{ mensajeError }}
      </div>

      <form (ngSubmit)="guardarCambios()">
        <div class="form-group">
          <label class="form-label">📞 Teléfono de Contacto</label>
          <div class="phone-input-group">
            <span class="phone-prefix">+503</span>
            <input 
              type="tel" 
              class="form-control" 
              [(ngModel)]="telefono"
              name="telefono"
              (input)="onTelefonoInput()"
              (blur)="onTelefonoBlur()"
              placeholder="0000-0000"
              maxlength="9">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">📧 Correo Electrónico Institucional</label>
          <input 
            type="email" 
            class="form-control" 
            [(ngModel)]="correo"
            name="correo"
            (blur)="onCorreoBlur()"
            placeholder="ejemplo@cewas.edu.sv">
        </div>

        <div class="button-container">
          <button type="submit" class="btn-guardar">Guardar Información</button>
          <button type="button" class="btn-cancelar" (click)="cancelarCambios()">Cancelar</button>
        </div>
      </form>

      <div class="preview-section">
        <h4>👀 Vista previa en vivo</h4>
        <div class="footer-preview">
          <div class="preview-item">
            <span>📞</span>
            <span>+503 {{ telefonoPreview }}</span>
          </div>
          <div class="preview-item">
            <span>✉️</span>
            <span>{{ correoPreview }}</span>
          </div>
        </div>
        
        <div *ngIf="hayCambiosSinGuardar" class="unsaved-changes">
          ⚠️ Tienes cambios pendientes de guardar
        </div>
      </div>
    </div>
  </div>
</div>
