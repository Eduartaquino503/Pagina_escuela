<footer class="site-footer" aria-label="Información de contacto">
  <div class="footer-top">
    <div class="footer-brand">
      <img src="/Imagenes/Logo%20Colegio.png" alt="Logo institucional" onerror="this.src='/favicon.ico'" />
      <span>Complejo Educativo Walter A. Soundy</span>
    </div>

    <nav class="footer-nav" aria-label="Navegación secundaria">
      <a href="#">Sobre nosotros</a>
      <a href="#">Servicios</a>
    </nav>

    <div class="footer-social" aria-label="Redes sociales">
      <a href="https://www.facebook.com/CEWASoficial" target="_blank" rel="noopener noreferrer">f</a>
    </div>
  </div>

  <div class="footer-body">
    <section class="footer-contact">
      <span class="tag">Centro de contacto</span>

      <div class="contact-item">
        <h2>Teléfono Institucional</h2>
        <p class="contact-primary">{{ telefono }}</p>
      </div>

      <div class="contact-item">
        <h2>Correo Electrónico</h2>
        <p class="contact-primary">{{ correo }}</p>
      </div>

      <div class="contact-item">
        <h2>Ubicación</h2>
        <p class="contact-address">
          9a Calle Oriente y 13 Av. Norte sobre Calle Chiltiupan, <br>
          Colonia Santa Mónica, Santa Tecla, El Salvador.
        </p>
      </div>
    </section>

    <section class="footer-subscribe" aria-label="Formulario de contacto rápido">
      <label for="footer-email">¿Necesitas más información?</label>
      <input id="footer-email" type="email" placeholder="Escribe tu correo aquí" />
      <button type="button">Solicitar información</button>
    </section>
  </div>
</footer>
