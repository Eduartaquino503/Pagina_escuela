<main class="auth-shell">
  <section class="auth-card">
    <div class="auth-copy">
      <span class="eyebrow">ADP Proyecto</span>
      <h1>Iniciar sesión</h1>
      <p>Accede al sistema administrativo</p>
    </div>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
      <label>
        <span>Correo</span>
        <input type="email" formControlName="email" placeholder="correo@empresa.com" />
      </label>

      <label>
        <span>Contraseña</span>
        <input type="password" formControlName="password" placeholder="Tu contraseña" />
      </label>

      <button type="submit" [disabled]="submitting">
        {{ submitting ? 'Validando...' : 'Entrar' }}
      </button>

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <a routerLink="/" 
   style="display: block; text-align: center; margin-top: 15px; color: #c9a34e; text-decoration: none; font-family: 'Poppins', sans-serif; font-size: 0.9rem; font-weight: 500;"
   onmouseover="this.style.color='#ffffff'" 
   onmouseout="this.style.color='#c9a34e'">
  ← Volver al Portal Público
</a>
    </form>
  </section>
</main>
